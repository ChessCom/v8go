name: auto-bump-downstreams
# D4: after a v8go change lands on main, open PRs against
# ChessCom/blindfox and ChessCom/er that bump their
# github.com/ChessCom/v8go dep to the new commit.
#
# Currently gated to workflow_dispatch only. Once blindfox and er
# have migrated off github.com/tommie/v8go (Phase E and F of the
# publish plan), flip the trigger to `push: branches: [main]` so
# this runs automatically.

on:
  workflow_dispatch:
    inputs:
      sha:
        description: "v8go SHA to bump downstreams to (defaults to current HEAD)."
        required: false
        type: string
  workflow_call:

permissions:
  contents: read

jobs:
  bump:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        downstream: [blindfox, er]
    steps:
      - name: gate on token
        id: gate
        env:
          TOKEN: ${{ secrets.CROSS_REPO_WRITE_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "CROSS_REPO_WRITE_TOKEN is not configured; cannot open PRs."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi
      - name: checkout v8go
        if: steps.gate.outputs.skip != '1'
        uses: actions/checkout@v4
        with:
          path: v8go
      - name: resolve target sha
        if: steps.gate.outputs.skip != '1'
        id: sha
        working-directory: v8go
        run: |
          if [ -n "${{ inputs.sha }}" ]; then
            echo "sha=${{ inputs.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"
          fi
      - name: checkout downstream
        if: steps.gate.outputs.skip != '1'
        uses: actions/checkout@v4
        with:
          repository: ChessCom/${{ matrix.downstream }}
          token: ${{ secrets.CROSS_REPO_WRITE_TOKEN }}
          path: ${{ matrix.downstream }}
      - name: setup go
        if: steps.gate.outputs.skip != '1'
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: ${{ matrix.downstream }}/go.sum
      - name: bump dep
        if: steps.gate.outputs.skip != '1'
        working-directory: ${{ matrix.downstream }}
        env:
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          set -e
          # Only meaningful once the downstream imports
          # github.com/ChessCom/v8go (Phase E/F). Until then this is
          # an explicit no-op signalled to the human.
          if ! grep -q 'github.com/ChessCom/v8go' go.mod; then
            echo "::warning::${{ matrix.downstream }} still imports github.com/tommie/v8go; skipping bump (migrate to ChessCom/v8go first)."
            exit 0
          fi
          go get "github.com/ChessCom/v8go@${SHA}"
          go mod tidy
      - name: open PR
        if: steps.gate.outputs.skip != '1'
        uses: peter-evans/create-pull-request@v6
        with:
          path: ${{ matrix.downstream }}
          token: ${{ secrets.CROSS_REPO_WRITE_TOKEN }}
          branch: auto/bump-v8go-${{ steps.sha.outputs.sha }}
          base: main
          title: "deps: bump github.com/ChessCom/v8go to ${{ steps.sha.outputs.sha }}"
          body: |
            Automated bump of `github.com/ChessCom/v8go` to commit
            `${{ steps.sha.outputs.sha }}`.

            See https://github.com/ChessCom/v8go/commit/${{ steps.sha.outputs.sha }}
            for the upstream change.
          commit-message: |
            deps: bump github.com/ChessCom/v8go to ${{ steps.sha.outputs.sha }}
          labels: |
            dependencies
            v8go
