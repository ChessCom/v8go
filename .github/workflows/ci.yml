name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: ci (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: install lld (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get install -y lld
          echo "CGO_LDFLAGS=-fuse-ld=lld" >> $GITHUB_ENV

      # --- lint (ubuntu only) ---
      - name: gofmt
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -o pipefail
          unformatted=$(gofmt -l . | { grep -v '^deps/' || true; })
          if [ -n "$unformatted" ]; then
            echo "gofmt diff in:"
            echo "$unformatted"
            gofmt -d $unformatted
            exit 1
          fi

      - name: go vet
        if: matrix.os == 'ubuntu-latest'
        run: go vet ./...

      - name: clang-format (advisory)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          shopt -s nullglob
          files=()
          for f in *.cc *.h context-macros.h value-macros.h; do
            [ -f "$f" ] || continue
            files+=("$f")
          done
          if [ ${#files[@]} -eq 0 ]; then
            echo "no C++ files to check"
            exit 0
          fi
          fails=0
          for f in "${files[@]}"; do
            if ! clang-format --style=Google --dry-run --Werror "$f" 2>/dev/null; then
              fails=$((fails+1))
            fi
          done
          echo "clang-format reported $fails non-conforming file(s); not gating."

      # --- build + test ---
      - name: go build
        run: go build ./...

      - name: go test
        run: go test -count=1 -timeout 5m -coverprofile=coverage.out ./...

      - name: enforce coverage threshold
        if: matrix.os == 'ubuntu-latest'
        run: |
          total=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          if [ "$(echo "$total < 93.0" | bc)" -eq 1 ]; then
            echo "FAIL: coverage is ${total}%, required >= 93%"
            echo ""
            echo "Uncovered functions:"
            go tool cover -func=coverage.out | grep -v '100.0%'
            exit 1
          fi

      - name: ESM snapshot flake detection
        run: go test -v -run "TestSnapshotESM|TestPackBundleESM" -count=3 -timeout 5m ./...

      # --- downstream compat ---
      - name: gate on compat token
        id: compat-gate
        env:
          TOKEN: ${{ secrets.CROSS_REPO_READ_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "CROSS_REPO_READ_TOKEN is not configured; skipping compat checks."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: checkout blindfox
        if: steps.compat-gate.outputs.skip != '1'
        uses: actions/checkout@v4
        with:
          repository: ChessCom/blindfox
          token: ${{ secrets.CROSS_REPO_READ_TOKEN }}
          path: blindfox

      - name: compat blindfox
        if: steps.compat-gate.outputs.skip != '1'
        run: |
          cd blindfox
          go mod edit -dropreplace=github.com/tommie/v8go || true
          go mod edit -replace="github.com/tommie/v8go=$GITHUB_WORKSPACE"
          go mod tidy
          go build ./...
          go test -short -count=1 -timeout 10m ./...

      - name: checkout er
        if: steps.compat-gate.outputs.skip != '1'
        uses: actions/checkout@v4
        with:
          repository: ChessCom/er
          token: ${{ secrets.CROSS_REPO_READ_TOKEN }}
          path: er

      - name: compat er
        if: steps.compat-gate.outputs.skip != '1'
        run: |
          cd er
          go mod edit -replace="github.com/tommie/v8go=$GITHUB_WORKSPACE"
          go mod tidy
          go build ./...
          go test -short -count=1 -timeout 10m ./...
