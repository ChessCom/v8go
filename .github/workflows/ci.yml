name: ci
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  ci:
    name: ci (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true

      - name: gofmt
        if: matrix.os == 'ubuntu-latest'
        run: |
          set -o pipefail
          unformatted=$(gofmt -l . | { grep -v '^deps/' || true; })
          if [ -n "$unformatted" ]; then
            echo "gofmt diff in:"
            echo "$unformatted"
            gofmt -d $unformatted
            exit 1
          fi

      - name: go vet
        if: matrix.os == 'ubuntu-latest'
        run: go vet ./...

      - name: clang-format (advisory)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update && sudo apt-get install -y clang-format
          shopt -s nullglob
          files=()
          for f in *.cc *.h context-macros.h value-macros.h; do
            [ -f "$f" ] || continue
            files+=("$f")
          done
          if [ ${#files[@]} -eq 0 ]; then
            echo "no C++ files to check"
            exit 0
          fi
          fails=0
          for f in "${files[@]}"; do
            if ! clang-format --style=Google --dry-run --Werror "$f" 2>/dev/null; then
              fails=$((fails+1))
            fi
          done
          echo "clang-format reported $fails non-conforming file(s); not gating."

      - name: go build
        run: go build ./...

      - name: go test
        run: go test -count=1 -timeout 5m -coverprofile=coverage.out ./...

      - name: enforce coverage threshold
        if: matrix.os == 'ubuntu-latest'
        run: |
          total=$(go tool cover -func=coverage.out | grep '^total:' | awk '{print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          if [ "$(echo "$total < 93.0" | bc)" -eq 1 ]; then
            echo "FAIL: coverage is ${total}%, required >= 93%"
            echo ""
            echo "Uncovered functions:"
            go tool cover -func=coverage.out | grep -v '100.0%'
            exit 1
          fi

      - name: ESM snapshot flake detection
        run: go test -v -run "TestSnapshotESM|TestPackBundleESM" -count=3 -timeout 5m ./...

  compat:
    name: compat-${{ matrix.downstream }} (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        downstream: [blindfox, er]
    steps:
      - name: gate on token
        id: gate
        env:
          TOKEN: ${{ secrets.CROSS_REPO_READ_TOKEN }}
        run: |
          if [ -z "$TOKEN" ]; then
            echo "CROSS_REPO_READ_TOKEN is not configured; skipping."
            echo "skip=1" >> "$GITHUB_OUTPUT"
          else
            echo "skip=0" >> "$GITHUB_OUTPUT"
          fi

      - name: checkout v8go (this PR)
        if: steps.gate.outputs.skip != '1'
        uses: actions/checkout@v4
        with:
          path: v8go

      - name: checkout downstream @ main
        if: steps.gate.outputs.skip != '1'
        uses: actions/checkout@v4
        with:
          repository: ChessCom/${{ matrix.downstream }}
          token: ${{ secrets.CROSS_REPO_READ_TOKEN }}
          path: ${{ matrix.downstream }}

      - name: setup go
        if: steps.gate.outputs.skip != '1'
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'
          cache: true
          cache-dependency-path: ${{ matrix.downstream }}/go.sum

      - name: pin downstream to this v8go via replace
        if: steps.gate.outputs.skip != '1'
        working-directory: ${{ matrix.downstream }}
        run: |
          set -e
          if [ "${{ matrix.downstream }}" = "blindfox" ]; then
            go mod edit -dropreplace=github.com/tommie/v8go || true
          fi
          go mod edit -replace="github.com/tommie/v8go=../v8go"
          go mod tidy
          cat go.mod | grep -E 'tommie/v8go|ChessCom/v8go' || true

      - name: build downstream
        if: steps.gate.outputs.skip != '1'
        working-directory: ${{ matrix.downstream }}
        run: go build ./...

      - name: test downstream (short)
        if: steps.gate.outputs.skip != '1'
        working-directory: ${{ matrix.downstream }}
        run: go test -short -count=1 -timeout 10m ./...
